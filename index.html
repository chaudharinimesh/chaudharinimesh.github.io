<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#08080b;color:#fff;font-family:'Inter',sans-serif;overflow-x:hidden;}
::selection{background:rgba(255,255,255,.18);}

/* Grid texture */
.grid-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  opacity:.04;
  background:
    linear-gradient(to right,#fff 1px,transparent 1px),
    linear-gradient(to bottom,#fff 1px,transparent 1px);
  background-size:64px 64px;
}

/* ── LOADER ── */
@keyframes bar-load{from{transform:scaleX(0);}to{transform:scaleX(1);}}
.bar-anim{animation:bar-load 2s cubic-bezier(.76,0,.24,1) forwards;transform-origin:left;}
@keyframes fade-up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.fade-up-1{animation:fade-up .7s .1s ease forwards;opacity:0;}
.fade-up-2{animation:fade-up .7s .3s ease forwards;opacity:0;}
.fade-up-3{animation:fade-up .7s .5s ease forwards;opacity:0;}
.fade-up-4{animation:fade-up .7s .7s ease forwards;opacity:0;}

/* ── NAV ── */
.nav-pill{
  position:fixed;top:1.1rem;left:50%;transform:translateX(-50%);
  z-index:999;
  display:flex;align-items:center;gap:1.75rem;
  background:rgba(8,8,11,.7);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:100px;
  padding:.75rem 1.5rem;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.nav-logo-btn{
  width:34px;height:34px;border-radius:50%;
  background:#fff;color:#000;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:11px;letter-spacing:-.02em;
  text-decoration:none;flex-shrink:0;
}
.nav-info{line-height:1.2;}
.nav-info-name{font-weight:600;font-size:13px;color:#fff;}
.nav-info-role{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.3);}
.nav-links{display:flex;gap:1.5rem;}
.nav-links a{
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.4);text-decoration:none;
  transition:color .2s;white-space:nowrap;
}
.nav-links a:hover{color:#fff;}

/* ── HERO ── */
.hero-wrap{
  min-height:100vh;
  display:flex;align-items:center;
  padding:7rem 3rem 4rem;
  position:relative;overflow:hidden;
}
.hero-grid{
  max-width:1400px;margin:0 auto;width:100%;
  display:grid;grid-template-columns:1fr auto;
  gap:4rem;align-items:center;
  position:relative;z-index:1;
}
.hero-h1{
  font-size:clamp(3.8rem,9vw,8.5rem);
  font-weight:900;letter-spacing:-.08em;line-height:.82;
  margin-bottom:1.75rem;
}
.availability-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  border-radius:100px;padding:.4rem 1rem;
  font-size:13px;color:rgba(255,255,255,.7);
  margin-bottom:1.5rem;
}
.hero-desc{
  font-size:clamp(14px,1.4vw,17px);
  color:rgba(255,255,255,.45);
  line-height:1.8;max-width:560px;margin-bottom:2rem;
}
.hero-btns{display:flex;gap:.9rem;flex-wrap:wrap;margin-bottom:2rem;}
.btn-white{
  background:#fff;color:#000;border-radius:100px;
  padding:.75rem 2rem;font-weight:700;font-size:14px;
  text-decoration:none;transition:all .3s;border:none;cursor:pointer;
  display:inline-block;
}
.btn-white:hover{transform:scale(1.04);box-shadow:0 8px 30px rgba(255,255,255,.15);}
.btn-outline{
  background:rgba(255,255,255,.04);color:#fff;
  border:1px solid rgba(255,255,255,.12);border-radius:100px;
  padding:.75rem 2rem;font-weight:600;font-size:14px;
  text-decoration:none;transition:all .3s;
  display:inline-block;
}
.btn-outline:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.25);}
.hero-pills{display:flex;flex-wrap:wrap;gap:.6rem;}
.hero-pill{
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.035);
  border-radius:100px;padding:.4rem 1rem;
  font-size:12px;color:rgba(255,255,255,.6);
}

/* ── DESK SCENE ── */
.scene{
  position:relative;width:500px;height:440px;
  perspective:1000px;flex-shrink:0;
}
/* Glow behind monitor */
.scene-glow{
  position:absolute;left:50%;top:42%;
  transform:translate(-50%,-50%);
  width:340px;height:240px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(100,180,255,.2) 0%,rgba(168,85,247,.12) 45%,transparent 72%);
  animation:glow-pulse 3s ease-in-out infinite alternate;
  pointer-events:none;z-index:0;
}
@keyframes glow-pulse{
  from{opacity:.7;transform:translate(-50%,-50%) scale(1);}
  to{opacity:1;transform:translate(-50%,-50%) scale(1.1);}
}
/* Desk surface */
.desk{
  position:absolute;bottom:0;left:0;right:0;height:120px;
  background:linear-gradient(180deg,#181828 0%,#10101e 100%);
  border-top:1px solid rgba(255,255,255,.06);
  transform:rotateX(6deg);transform-origin:bottom;z-index:2;
}
.desk::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(100,180,255,.35),rgba(168,85,247,.3),transparent);
}
.desk::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(100,180,255,.05),transparent 55%);
}
/* Stand */
.stand-neck{
  position:absolute;bottom:134px;left:50%;transform:translateX(-48%);
  width:9px;height:48px;background:linear-gradient(180deg,#2c2c44,#1c1c30);
  border-radius:2px;z-index:3;
}
.stand-base{
  position:absolute;bottom:126px;left:50%;transform:translateX(-48%);
  width:70px;height:8px;background:linear-gradient(180deg,#282840,#18182a);
  border-radius:4px;z-index:3;box-shadow:0 4px 12px rgba(0,0,0,.5);
}
/* Monitor */
.monitor{
  position:absolute;bottom:182px;left:50%;transform:translateX(-48%);
  width:290px;height:190px;
  background:#0c0c18;
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:8px;z-index:4;overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(0,0,0,.4),
    0 0 40px rgba(100,180,255,.14),
    0 0 80px rgba(168,85,247,.07),
    0 24px 60px rgba(0,0,0,.65);
}
/* Bezel top */
.monitor::before{
  content:'';position:absolute;top:0;left:0;right:0;height:20px;
  background:#111122;border-bottom:1px solid rgba(255,255,255,.06);z-index:2;
}
/* Camera */
.monitor::after{
  content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);
  width:5px;height:5px;border-radius:50%;
  background:#1a1a2e;border:1px solid rgba(255,255,255,.08);z-index:3;
}
.monitor-screen{
  position:absolute;top:20px;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,#0d1117,#0a0e1a);overflow:hidden;
}
.monitor-screen::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 25%,rgba(100,180,255,.15),transparent 60%);
  pointer-events:none;
}
/* Window dots */
.win-dots{position:absolute;top:5px;left:10px;display:flex;gap:4px;z-index:5;}
.wd{width:6px;height:6px;border-radius:50%;}
.wd-r{background:#ff5f57;} .wd-y{background:#febc2e;} .wd-g{background:#28c840;}
/* Code lines */
.cline{
  position:absolute;left:10px;right:8px;height:2px;border-radius:1px;
  background:rgba(255,255,255,.07);
}
.cline.active{background:rgba(100,180,255,.5);}
.cline.purple{background:rgba(168,85,247,.45);}
.cline.green{background:rgba(74,222,128,.35);}
/* Blinking cursor on screen */
.scursor{
  position:absolute;bottom:26px;left:72px;width:2px;height:10px;
  background:rgba(100,180,255,.9);
  animation:blink-c .9s steps(1) infinite;
}
@keyframes blink-c{0%,100%{opacity:1;}50%{opacity:0;}}
/* Person silhouette */
.person{
  position:absolute;bottom:118px;left:50%;transform:translateX(-30%);z-index:1;
}
.p-head{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#fdc9b4,#e8a585);
  margin:0 auto;position:relative;
  box-shadow:0 0 18px rgba(253,201,180,.1);
}
.p-head::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 40% 38%,rgba(100,180,255,.1),transparent 55%);
}
.p-body{
  width:52px;height:46px;
  background:linear-gradient(180deg,#2a2a4a,#1e1e36);
  border-radius:8px 8px 0 0;margin:4px auto 0;position:relative;
}
.p-body::before{
  content:'';position:absolute;bottom:6px;left:-16px;
  width:18px;height:7px;background:#2a2a4a;border-radius:4px;
  transform:rotate(-14deg);
}
.p-body::after{
  content:'';position:absolute;bottom:6px;right:-16px;
  width:18px;height:7px;background:#2a2a4a;border-radius:4px;
  transform:rotate(14deg);
}
/* Keyboard */
.keyboard{
  position:absolute;bottom:32px;left:50%;transform:translateX(-42%);
  width:210px;height:58px;
  background:linear-gradient(180deg,#1c1c2e,#14142a);
  border:1px solid rgba(255,255,255,.07);border-radius:5px;
  z-index:5;box-shadow:0 8px 24px rgba(0,0,0,.5);overflow:hidden;
}
.keyboard::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(90deg,transparent 0,transparent 13px,rgba(255,255,255,.025) 13px,rgba(255,255,255,.025) 14px),
    repeating-linear-gradient(0deg,transparent 0,transparent 9px,rgba(255,255,255,.025) 9px,rgba(255,255,255,.025) 10px);
}
.key-glow{
  position:absolute;bottom:7px;left:25px;right:25px;height:3px;
  background:linear-gradient(90deg,transparent,rgba(100,180,255,.45),rgba(168,85,247,.45),transparent);
  border-radius:2px;animation:key-type 2s ease-in-out infinite;
}
@keyframes key-type{
  0%{transform:scaleX(.25);opacity:0;}
  30%{opacity:1;}
  70%{transform:scaleX(1);opacity:1;}
  100%{transform:scaleX(.25);opacity:0;}
}
/* Mouse */
.mouse{
  position:absolute;bottom:38px;right:60px;
  width:20px;height:32px;
  background:linear-gradient(180deg,#222238,#181830);
  border:1px solid rgba(255,255,255,.08);border-radius:10px 10px 8px 8px;
  z-index:5;box-shadow:0 4px 10px rgba(0,0,0,.4);
}
.mouse::before{
  content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);
  width:1px;height:9px;background:rgba(255,255,255,.12);
}
/* Cup */
.cup{
  position:absolute;bottom:32px;right:20px;
  width:20px;height:24px;
  background:linear-gradient(180deg,#2a1a0d,#1c1007);
  border:1px solid rgba(255,255,255,.06);border-radius:2px 2px 4px 4px;z-index:5;
}
.cup::before{content:'';position:absolute;top:-4px;left:2px;right:2px;height:4px;background:#321c0c;border-radius:2px;}
.cup-steam{
  position:absolute;bottom:56px;right:28px;
  width:2px;height:8px;
  background:linear-gradient(to top,rgba(255,255,255,.14),transparent);
  border-radius:2px;z-index:5;
  animation:steam-rise 2.2s ease-in-out infinite;
}
@keyframes steam-rise{0%,100%{transform:translateY(0);opacity:.6;}50%{transform:translateY(-5px);opacity:.15;}}
/* Notebook */
.notebook{
  position:absolute;bottom:32px;left:20px;
  width:48px;height:62px;
  background:#192219;border:1px solid rgba(255,255,255,.06);
  border-radius:2px;z-index:5;box-shadow:2px 4px 10px rgba(0,0,0,.35);
  transform:rotate(-5deg);
}
.notebook::before{
  content:'';position:absolute;top:6px;left:5px;right:5px;height:1px;
  background:rgba(255,255,255,.07);
  box-shadow:0 5px 0 rgba(255,255,255,.05),0 10px 0 rgba(255,255,255,.04),0 15px 0 rgba(255,255,255,.04),0 20px 0 rgba(255,255,255,.03);
}
/* Floating badges */
.fbadge{
  position:absolute;z-index:10;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.6);backdrop-filter:blur(14px);
  padding:.45rem .85rem;border-radius:8px;
  font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.04em;
  color:rgba(255,255,255,.65);white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.fbadge-1{top:24px;right:-8px;animation:fl1 4s ease-in-out infinite;}
.fbadge-2{top:110px;left:-16px;animation:fl2 5s ease-in-out infinite;}
.fbadge-3{bottom:60px;right:-4px;animation:fl1 3.5s 1s ease-in-out infinite;}
@keyframes fl1{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes fl2{0%,100%{transform:translateY(0);}50%{transform:translateY(6px);}}
.fbdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.fbdot-g{background:#4ade80;} .fbdot-p{background:#a855f7;} .fbdot-b{background:#60a5fa;}

/* ── SECTIONS ── */
section{position:relative;z-index:1;}
.section-inner{max-width:1200px;margin:0 auto;}
.sec-wrap{padding:7rem 3rem;border-top:1px solid rgba(255,255,255,.07);}
.sec-label{
  font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,255,255,.3);margin-bottom:.75rem;
}
.sec-h{
  font-size:clamp(2.8rem,5.5vw,5.5rem);font-weight:900;
  letter-spacing:-.07em;line-height:.88;margin-bottom:3rem;
}

/* ── CARDS ── */
.card{
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.015));
  border-radius:2rem;padding:2rem;
  transition:all .4s;position:relative;overflow:hidden;
}
.card:hover{
  border-color:rgba(168,85,247,.22);
  transform:translateY(-5px);
  box-shadow:0 24px 60px rgba(0,0,0,.35);
}
.card-shimmer{
  position:absolute;inset:0;border-radius:inherit;
  background:radial-gradient(circle at top right,rgba(168,85,247,.06),transparent 55%);
  pointer-events:none;
}

/* Project detail box */
.proj-detail-box{
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.07);
  border-radius:1.25rem;padding:1.5rem;
}
.stack-tag{
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.035);
  border-radius:100px;padding:.3rem .85rem;
  font-size:11px;color:rgba(255,255,255,.6);
}

/* ── TECH BUBBLES ── */
.tech-bubble{
  width:92px;height:92px;border-radius:50%;
  background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 14px 44px rgba(255,255,255,.07);
  transition:all .4s;cursor:default;flex-shrink:0;
  padding:.4rem;
}
.tech-bubble:hover{
  transform:translateY(-10px) scale(1.1);
  box-shadow:0 26px 60px rgba(255,255,255,.13);
}
.tech-bubble img{width:34px;height:34px;object-fit:contain;display:block;}
.tech-bubble-name{
  font-size:8.5px;font-weight:700;letter-spacing:.03em;
  text-align:center;color:#000;margin-top:5px;line-height:1.2;
  padding:0 5px;max-width:100%;
}
.tech-bubble-init{
  font-size:16px;font-weight:900;color:#000;
}

/* ── CONTACT ── */
.contact-icon-btn{
  width:60px;height:60px;border-radius:50%;
  background:#fff;display:flex;align-items:center;justify-content:center;
  text-decoration:none;transition:all .4s;
  box-shadow:0 12px 40px rgba(255,255,255,.09);flex-shrink:0;
}
.contact-icon-btn:hover{
  transform:translateY(-6px) scale(1.1);
  box-shadow:0 22px 60px rgba(255,255,255,.15);
}
.contact-icon-btn img{width:30px;height:30px;object-fit:contain;}
.contact-icon-btn svg{width:30px;height:30px;}

.form-input{
  width:100%;background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.08);border-radius:14px;
  padding:13px 17px;color:#fff;font-size:14px;
  font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;
}
.form-input::placeholder{color:rgba(255,255,255,.27);}
.form-input:focus{border-color:rgba(255,255,255,.22);}
textarea.form-input{resize:none;}

/* ── EDUCATION LOGO ── */
.edu-logo-wrap{
  width:68px;height:68px;border-radius:50%;background:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 36px rgba(255,255,255,.07);
  transition:all .4s;margin-bottom:1.5rem;flex-shrink:0;
}
.edu-logo-wrap:hover{transform:scale(1.1) translateY(-4px);}
.edu-logo-wrap img{width:42px;height:42px;object-fit:contain;}
.edu-logo-fallback{font-size:14px;font-weight:900;color:#000;}

/* ── EXPERIENCE bullet ── */
.exp-bullet{
  font-size:14px;color:rgba(255,255,255,.4);line-height:1.75;
  padding-left:1rem;position:relative;
}
.exp-bullet::before{
  content:'·';position:absolute;left:0;
  color:rgba(168,85,247,.7);font-size:18px;line-height:1.3;
}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  .hero-grid{grid-template-columns:1fr;gap:3rem;}
  .scene{width:340px;height:300px;margin:0 auto;}
  .monitor{width:200px;height:132px;bottom:128px;}
  .stand-neck{bottom:92px;} .stand-base{bottom:84px;}
  .keyboard{width:148px;height:44px;bottom:22px;}
  .mouse{right:38px;bottom:26px;} .cup{right:14px;bottom:22px;}
  .notebook{left:14px;bottom:22px;width:36px;height:48px;}
  .fbadge-1,.fbadge-2,.fbadge-3{display:none;}
  .nav-links{display:none;}
  .nav-pill{gap:1rem;}
}
@media(max-width:640px){
  .nav-info{display:none;}
  .hero-wrap,.sec-wrap{padding-left:1.5rem;padding-right:1.5rem;}
}
</style>
</head>

/* ── TECH BUBBLE ── */
function TechBubble({ name, slug, color }) {
  const [imgOk, setImgOk] = useState(!!slug);
  const src = slug ? `https://cdn.simpleicons.org/${slug}/${color || "000000"}` : null;
  const initials = name.split(" ").map(w => w[0]).join("").slice(0, 3);

  return (
    <div className="tech-bubble">
      {imgOk && src
        ? <img src={src} alt={name} onError={() => setImgOk(false)} />
        : <span className="tech-bubble-init">{initials}</span>
      }
      <span className="tech-bubble-name">{name}</span>
    </div>
  );
}

/* ── EDU LOGO ── */
function EduLogo({ domain, short }) {
  const [ok, setOk] = useState(true);

    <div className="edu-logo-wrap">

            alt={short}

          />
        : <span className="edu-logo-fallback">{short}</span>

    </div>
  );
}
